<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
  </defs>

  <!-- 배경: 둥근 사각형 황금-오렌지 그라디언트 -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- 졸업 모자 보드 (마름모) -->
  <polygon points="16,5 27,10.5 16,16 5,10.5" fill="white"/>

  <!-- 모자 몸통 -->
  <path d="M10 12.5 L10 19.5 Q13 22.5 16 22.5 Q19 22.5 22 19.5 L22 12.5"
        fill="rgba(255,255,255,0.25)" stroke="white" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 태슬 줄 -->
  <line x1="26.5" y1="10.5" x2="26.5" y2="17.5"
        stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 태슬 끝 -->
  <circle cx="26.5" cy="19" r="1.8" fill="white"/>
</svg>
